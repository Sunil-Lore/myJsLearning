<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript simple FOR loop</title>
</head>
<body>
    <!-- JavaScript FOR loop -->
    <script>
        for(let i=1;i<=5;i++){
            console.log("Value of i: " + i );
        }
    </script>
</body>
</html>
