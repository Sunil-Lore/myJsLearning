<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Using document.title</title>
</head>
<body>
  <p>First paragraph</p>
  <p>Second paragraph</p>
  <p>Third paragraph</p>
  <p id="showTitle"></p>


  <button onclick="showText()">Show Page Title</button>

  <script>
    function showText() {
      document.getElementById('showTitle').innerHTML=document.title;
      }
  </script>
</body>
</html>
