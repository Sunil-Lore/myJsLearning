<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Using body.style.color</title>
</head>
<body>
  <div>
    <p>Hello World!</p>
  </div>
  <p>First paragraph</p>
  <p>Second paragraph</p>
  <p>Third paragraph</p>


  <button onclick="changeColor()">Show Page Title</button>

  <script>
    function changeColor() {
      document.body.style.color='forestgreen';
     }
  </script>
</body>
</html>
