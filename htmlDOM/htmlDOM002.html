<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Using getElementsByClassName</title>
</head>
<body>
  <p class="demo">First paragraph</p>
  <p class="demo">Second paragraph</p>
  <p class="demo">Third paragraph</p>

  <button onclick="changeText()">Change Text</button>

  <script>
    function changeText() {
      // getElementsByClassName returns a collection (like an array)
      let elements = document.getElementsByClassName("demo");

      // Loop through each element and change its text
      for (let i = 0; i < elements.length; i++) {
        elements[i].innerHTML = "Updated text for paragraph " + (i + 1);
      }
    }
  </script>
</body>
</html>
