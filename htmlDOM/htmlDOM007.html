<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Using object.assign</title>
</head>
<body>
    <p>First Paragraph</p>
    <p>Second Paragraph</p>
    <p>Third Paragraph</p>
    <p>Fourth Paragraph</p>
    <button onclick="applyStyle()">Apply Style</button>
    <script>
        let para = document.getElementsByTagName("p"); // define para
        function applyStyle(){
            Object.assign(para[0].style,{
                color:"red",
                fontSize:"24px",
                backgroundColor:"yellow"
            });
        }
    </script>
</body>
</html>
